<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>thepool: parallel streaming download</title>
    <link rel="stylesheet" href="/assets/@picocss/pico/css/pico.min.css">
    <style>
      .mono{font-family:ui-monospace,Menlo,Consolas,monospace}
      .tiny{font-size:.9rem}
    </style>
  </head>
  <body>
    <main class="container">
      <h1>thepool: parallel streaming download</h1>
      <form id="form">
        <fieldset>
          <label>
            Collection ID
            <input id="collection" type="text" placeholder="loading..." required disabled />
          </label>
          <label>
            Parallel workers: <span id="parallel_count">6</span>
            <input type="range" id="parallel" min="1" max="12" value="6" />
          </label>
        </fieldset>
        <input type="submit" id="submit" value="Download">
      </form>

      <div class="grid">
        <div>
          <h3>Output</h3>
          <pre id="log" class="mono tiny"></pre>
        </div>
        <div>
          <h3>Downloads</h3>
          <div id="panel"></div>
        </div>
      </div>
    </main>

    <script>
      const logEl = document.getElementById('log')
      const panel = document.getElementById('panel')
      const submit = document.getElementById('submit')
      const parallelEl = document.getElementById('parallel')
      const parallelCountEl = document.getElementById('parallel_count')
      parallelEl.addEventListener('input', () => parallelCountEl.textContent = parallelEl.value)
      let download
      
      fetch('/api/config').then(r=>r.json()).then(cfg=>{
        download = cfg.download
        log('Config loaded.')
      })

      const id  = window.location.pathname.replace('/', '')
      document.getElementById('collection').value = id     

      function log(s){ logEl.textContent += s+'\n'; logEl.scrollTop = logEl.scrollHeight }
      function formatBytes(n){
        if (n<1024) return `${n} B`
        const u=['KB','MB','GB','TB']; let i=-1
        do{ n/=1024; i++ }while(n>=1024 && i<u.length-1)
        return `${n.toFixed(n>=100?0:n>=10?1:2)} ${u[i]}`
      }

      document.getElementById('form').addEventListener('submit', async (e)=>{
        e.preventDefault()
        if(!id){ log('No collection id.'); return }
        submit.disabled = true
        try{
          await downloadCollectionParallel(id, +parallelEl.value)
          log('All done.')
        }catch(err){
          log('Error: '+(err?.message||err))
        }finally{
          submit.disabled = false
        }
      })

      async function downloadCollectionParallel(collectionId, workers){
        log(`Fetching collection: ${collectionId}`)
        const meta = await fetch(`/api/collections/${encodeURIComponent(collectionId)}`).then(r=>{
          if(!r.ok) throw new Error(`HTTP ${r.status} loading collection`)
          return r.json()
        })

        const name = meta.data.originalName || `download-${collectionId}`
        const mime = meta.data.mimeType || 'application/octet-stream'
        const chunkIds = meta.data.chunkIds.match(/.{1,10}/g)


        const total = chunkIds.length
        log(`File: ${name} • ${total} chunk(s)`)

        // UI box
        const box = document.createElement('div')
        box.innerHTML = `
          <details open>
            <summary>
              <strong>${name}</strong> • ${total} chunk(s)
              <progress id="fprog" max="${meta.size||0}" value="0" style="width:100%"></progress>
              <div class="tiny mono" id="ftext">0% • 0 / ${meta.size?formatBytes(meta.size):'unknown'}</div>
            </summary>
            <ul id="rows"></ul>
          </details>
        `
        panel.prepend(box)
        const fprog = box.querySelector('#fprog')
        const ftext = box.querySelector('#ftext')
        const rows  = box.querySelector('#rows')

        const row = chunkIds.map((cid,i)=>{
          const li = document.createElement('li')
          li.innerHTML = `
            <div class="grid">
              <span class="tiny mono">Chunk #${i+1} (${cid.slice(0,8)}…): 0 B</span>
              <progress max="100" value="0"></progress>
            </div>
          `
          rows.appendChild(li)
          return { prog: li.querySelector('progress'), txt: li.querySelector('span') }
        })

        const results = new Array(total)        // Uint8Array per chunk
        const sizes   = new Array(total).fill(0)
        let fileLoaded = 0
        let totalSizeKnown = typeof meta.size === 'number' && meta.size > 0
        if (!totalSizeKnown) { fprog.removeAttribute('max') } // indeterminate style

        function bumpFile(delta){
          fileLoaded += delta
          if (totalSizeKnown) {
            fprog.max = meta.size
            fprog.value = fileLoaded
            const pct = Math.floor(fileLoaded / meta.size * 100)
            ftext.textContent = `${pct}% • ${formatBytes(fileLoaded)} / ${formatBytes(meta.size)}`
          } else {
            // Unknown total size. Show running total.
            ftext.textContent = `${formatBytes(fileLoaded)} downloaded`
          }
        }

        let next = 0
        async function worker(){
          while(true){
            const i = next++
            if (i >= total) return
            const cid = chunkIds[i]
            const res = await fetch(`${download}/${encodeURIComponent(cid)}`)
            if (!res.ok) throw new Error(`Chunk ${cid} is missing: probably your file is expired.`)

            const reader = res.body.getReader()
            const parts = []
            let loaded = 0
            while(true){
              const {done, value} = await reader.read()
              if (done) break
              parts.push(value)
              loaded += value.byteLength
              sizes[i] = loaded
              row[i].prog.max = 100
              row[i].prog.value = 100 * (loaded / Math.max(loaded, 1)) // fills as we go
              row[i].txt.textContent = `Chunk #${i+1} (${cid.slice(0,8)}…): ${formatBytes(loaded)}`
              bumpFile(value.byteLength)
            }
            // Concatenate this chunk
            const chunkBuf = new Uint8Array(loaded)
            let o = 0
            for (const p of parts){ chunkBuf.set(p, o); o += p.length }
            results[i] = chunkBuf
          }
        }

        await Promise.all(Array.from({length: Math.min(workers, total)}, worker))

        // If total size was unknown, set it now for final bar fill.
        if (!totalSizeKnown){
          const sum = sizes.reduce((a,b)=>a+b,0)
          fprog.max = sum; fprog.value = sum
          ftext.textContent = `100% • ${formatBytes(sum)} / ${formatBytes(sum)}`
        }

        // Stitch chunks in order
        const finalSize = sizes.reduce((a,b)=>a+b,0)
        const fileBuf = new Uint8Array(finalSize)
        let offset = 0
        for (let i=0;i<results.length;i++){
          const chunk = results[i]
          fileBuf.set(chunk, offset)
          offset += chunk.length
        }

        // Save
        const blob = new Blob([fileBuf], { type: mime })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = name
        document.body.appendChild(a)
        a.click()
        a.remove()
        URL.revokeObjectURL(url)

        log(`File complete: ${name}`)
      }
    </script>
  </body>
</html>
