name: Build images
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout files

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: |
          npm ci --ignore-scripts
          npm run build
          npm prune --omit=dev --ignore-scripts

      - run: |
          mkdir -p tmp
          openssl req -x509 -newkey rsa:2048 \
            -keyout tmp/key.pem -out tmp/cert.pem \
            -days 36500 -nodes -subj "/CN=example.com"

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - run: |
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o app-linux-amd64 ./main.go
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o app-linux-arm64 ./main.go

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ghcr.io/pmh-only/thepool:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
