<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>thepool: parallel streaming upload</title>
    <link rel="stylesheet" href="/assets/@picocss/pico/css/pico.min.css">
    <style>
      .mono{font-family:ui-monospace,Menlo,Consolas,monospace}
      .tiny{font-size:.9rem}
    </style>
  </head>
  <body>
    <main class="container">
      <h1>thepool: parallel streaming upload</h1>
      <form id="form">
        <fieldset>
          <label>
          File(s)
          <input type="file" id="file" multiple />
          </label>
          <label>
          Parallel workers: <span id="parallel_count">6</span>
          <input type="range" id="parallel" min="1" max="12" value="6" />
          </label>
        </fieldset>
        <input type="submit" id="submit" value="Submit">
      </form>
      <div class="grid">
        <div>
          <h3>Output</h3>
          <pre id="log" class="mono tiny"></pre>
        </div>
        <div>
          <h3>Uploads</h3>
          <div id="panel"></div>
        </div>
      </div>
    </main>
    <script>
      const logEl = document.getElementById('log')
      const panel  = document.getElementById('panel')
      const submit = document.getElementById('submit')
      const parallelEl = document.getElementById('parallel')
      const parallelCountEl = document.getElementById('parallel_count')
      const chunkMbEl= { value: undefined }
      parallelEl.addEventListener('input', () => parallelCountEl.textContent = parallelEl.value)
      
      // Optional server config
      fetch('/api/config').then(r=>r.json()).then(cfg=>{
        if (typeof cfg.chunkSize === 'number') chunkMbEl.value = cfg.chunkSize
        log('Config loaded.')
      })
      
      document.getElementById('form').addEventListener('submit', async (e)=>{
        e.preventDefault()
        const files = document.getElementById('file').files
        if (!files || files.length===0){ log('No files.'); return }
        submit.disabled = true
        const workers = +parallelEl.value
        const chunkSize = (+chunkMbEl.value||5) * 1024 * 1024
        try{
          for (const file of files){
            await uploadFileParallelStreaming(file, chunkSize, workers)
          }
          log('All done.')
        }catch(err){
          log('Error: '+(err?.message||err))
        }finally{
          submit.disabled = false
        }
      })
      
      function log(s){ logEl.textContent += s+'\n'; logEl.scrollTop = logEl.scrollHeight }
      
      function formatBytes(n){
        if (n<1024) return `${n} B`
        const u=['KB','MB','GB','TB']; let i=-1
        do{ n/=1024; i++ }while(n>=1024 && i<u.length-1)
        return `${n.toFixed(n>=100?0:n>=10?1:2)} ${u[i]}`
      }
      
      function planChunks(size, chunkSize){
        const arr=[]; let start=0, idx=0
        while(start<size){
          const end = Math.min(start+chunkSize, size)
          arr.push({index:idx++, start, end, size:end-start})
          start=end
        }
        return arr
      }
      
      async function uploadFileParallelStreaming(file, chunkSize, workers){
        log(`\nFile: ${file.name} (${formatBytes(file.size)})`)
        const tasks = planChunks(file.size, chunkSize)
        const total = tasks.length
      
        const box = document.createElement('div')
        box.innerHTML = `
          <details open>
            <summary>
              <strong>${file.name}</strong> • ${total} chunk(s)
              <progress id="fprog" max="${file.size}" value="0" style="width:100%"></progress>
              <div class="tiny mono" id="ftext">0% • 0 / ${formatBytes(file.size)}</div>
            </summary>
            <ul id="rows"></ul>
          </details>
        `
        panel.prepend(box)
        const fprog = box.querySelector('#fprog')
        const ftext = box.querySelector('#ftext')
        const rows  = box.querySelector('#rows')
      
        const row = tasks.map((t,i)=>{
          const li = document.createElement('li')
          li.innerHTML = `
            <div class="grid">
              <span class="tiny mono">Chunk #${i+1}: 0 / ${formatBytes(t.size)} (0%)</span>
              <progress max="${t.size}" value="0"></progress>
            </div>
          `
          rows.appendChild(li)
          return { prog: li.querySelector('progress'), txt: li.querySelector('span') }
        })
      
        const results = new Array(total)
        let fileUploaded = 0
        let next = 0
      
        function bumpFile(delta){
          fileUploaded += delta
          fprog.value = fileUploaded
          const pct = Math.floor(fileUploaded / file.size * 100)
          ftext.textContent = `${pct}% • ${formatBytes(fileUploaded)} / ${formatBytes(file.size)}`
        }
      
        async function worker(){
          while(true){
            const i = next++
            if (i >= total) return
            const t = tasks[i]
            const blob = file.slice(t.start, t.end)
      
            let loaded = 0
            const metered = blob.stream().pipeThrough(new TransformStream({
              transform(chunk, ctl){
                loaded += chunk.byteLength
                row[i].prog.value = loaded
                const pct = Math.floor(loaded / t.size * 100)
                row[i].txt.textContent = `Chunk #${i+1}: ${formatBytes(loaded)} / ${formatBytes(t.size)} (${pct}%)`
                bumpFile(chunk.byteLength)
                ctl.enqueue(chunk)
              }
            }))
      
            const res = await fetch('/api/chunks', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/octet-stream'
              },
              body: metered,
              duplex: 'half'
            })
      
            if (!res.ok) throw new Error(`HTTP ${res.status}`)
            const json = await res.json().catch(()=>({}))
            results[i] = json.id || null
          }
        }
      
        await Promise.all(Array.from({length: Math.min(workers, total)}, worker))
      
        const collections = await fetch('/api/collections', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            collectionId: '',
            originalName: file.name,
            mimeType: file.type,
            chunkIds: results.join('')
          })
        }).then((res) => res.json())

        log(`File complete: ${file.name}`)
        log(`${window.location.host}/${collections.id}`)
      }
    </script>
  </body>
</html>
