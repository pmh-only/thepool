<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>

    <title>thepool. - file upload</title>

    <link rel="stylesheet" href="/assets/style.output.css">
    <link rel="stylesheet" href="/lib/@fontsource/vt323/index.css">
    <link rel="stylesheet" href="/lib/@fontsource-variable/roboto/index.css">
    <link rel="stylesheet" href="/lib/@fontsource-variable/merriweather/index.css">

    <link rel="shortcut icon" href="/assets/favicon.webp" type="image/webp">

    <meta name="description" content="thepool is a file sharing service with unlimited file sizes and reliable parallel upload/download capabilities." />
    <meta name="keywords" content="thepool, file, file share, file upload, file download, parallel upload, parallel download" />
    <meta name="author" content="Minhyeok Park" />
    <meta name="robots" content="noindex" />

    <meta content="thepool." property="og:title" />
    <meta content="thepool is a file sharing service with unlimited file sizes and reliable parallel upload/download capabilities." property="og:description" />
    <meta content="https://pool.pmh.codes" property="og:url" />
    <meta content="https://pmh.codes/assets/favicon.webp" property="og:image" />
    <meta content="website" property="og:type" />
    <meta content="pmh.codes" property="og:site_name" />
    <meta content="512" property="og:image:width" />
    <meta content="512" property="og:image:height" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@pmh_only" />
    <meta name="twitter:creator" content="@pmh_only" />
    <meta name="twitter:title" content="thepool." />
    <meta name="twitter:description" content="thepool is a file sharing service with unlimited file sizes and reliable parallel upload/download capabilities." />
    <meta name="twitter:image" content="https://pool.pmh.codes/assets/favicon.webp" />

    <meta content="#ffaaaa" name="theme-color" />
    <meta name="msapplication-TileColor" content="#c59f61" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <link rel="manifest" href="/assets/manifest.json" />
  </head>
  <body>
    <nav class="navbar bg-base-100 shadow-sm">
      <a class="btn btn-ghost text-xl ff-display" href="/">thepool.</a>
    </nav>

    <main class="flex-1 grow container py-8 px-4 m-auto flex flex-col gap-6 items-end">
      <div class="flex gap-6 flex-wrap w-full flex-1 grow flex-col lg:flex-row lg:items-start">
        <div class="flex flex-col gap-6 lg:max-w-sm w-full">
          <form id="form">
            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-full border p-4">
              <legend class="fieldset-legend">Upload file</legend>
    
              <label class="label">File(s)</label>
              <input class="file-input w-full" type="file" id="file" multiple />
    
              <label class="mt-2 label">Parallel workers: <span id="parallel_count" class="font-bold">6</span></label>
              <div class="w-full">
                <input class="range w-full" type="range" id="parallel" min="1" max="12" value="6" />
                <div class="flex justify-between px-2 mt-1 text-lg ff-mono">
                  <span>1</span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span>6</span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span>F</span>
                </div>
              </div>
              
              <button type="submit" id="submit" class="btn btn-primary mt-4">
                Parallel Upload
              </button>
            </fieldset>
          </form>

          <div class="mockup-code w-full flex-1 grow overflow-auto hidden lg:block min-h-32" id="log"></div>
        </div>
  
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box grow flex-1 border p-4 min-h-64 lg:min-h-full">
          <legend class="fieldset-legend">Upload tasks</legend>
          <div id="panel" class="flex flex-col gap-2">

          </div>
        </fieldset>
      </div>

    </main>
    
    <script src="/assets/commons.js"></script>
    <script src="/assets/upload.js"></script>
  </body>
</html>
